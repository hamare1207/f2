<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>App</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div id="app" class="app">
            <div class="card">
                <h1 class="title">FizzBuzz</h1>

                <div class="stats">
                    <div class="panel">
                        <p class="eyebrow">Count</p>
                        <p id="count" class="value">1</p>
                    </div>

                    <div class="panel">
                        <p class="eyebrow">Result</p>
                        <p id="result" class="value">1</p>
                    </div>
                </div>

                <div class="button-grid">
                    <button id="prev" class="button" type="button">
                        Prev
                    </button>
                    <button id="reset" class="button" type="button">
                        Reset
                    </button>
                    <button id="next" class="button" type="button">
                        Next
                    </button>
                </div>
            </div>
        </div>

        <script src="js/app.js"></script>
    </body>
</html>
